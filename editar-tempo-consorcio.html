<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Seven Gold | Editar Tempos</title>
    <link rel="icon" href="assets/logo-copa.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <script>document.documentElement.dataset.adminSidebar = localStorage.getItem("seven-gold-admin-sidebar-collapsed") === "true" ? "collapsed" : "expanded";</script>
    <link rel="stylesheet" href="home.css?v=44" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#150126" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Seven Gold" />
    <link rel="apple-touch-icon" href="/assets/icons/apple-touch-icon.png" />
  </head>
  <body class="owner-history-body" data-require-auth data-permission-area="historia_dono" data-login-page="index.html" data-allowed-roles="dono" data-denied-redirect="empresa.html" data-unified-admin>
    <div class="history-dashboard-shell">
      <aside class="history-sidebar">
        <a class="history-sidebar-brand" href="empresa.html"><img src="assets/logo-copa.png" alt="Seven Gold" /><span><strong>Seven Gold</strong><small>História do Dono</small></span></a>
        <nav class="history-sidebar-nav">
          <a class="history-back" href="historia-dono.html"><i data-lucide="chevron-left"></i><span>Voltar à História</span></a>
          <a href="empresa.html"><i data-lucide="house"></i><span>Painel</span></a>
          <a class="active" href="historia-dono.html"><i data-lucide="crown"></i><span>História do Dono</span></a>
          <a href="perfil.html?area=empresa"><i data-lucide="user-round"></i><span>Meu perfil</span></a>
        </nav>
        <a class="history-sidebar-profile" href="perfil.html?area=empresa"><span class="profile-avatar" data-user-avatar>U</span><span><strong data-user-name>Usuário</strong><small data-user-role>Perfil</small></span></a>
      </aside>
      <main class="history-dashboard-main history-shell time-editor-shell">
        <section class="time-editor-panel">
        <div>
          <span>Data inicial</span>
          <h1>Início no consórcio</h1>
          <p>O tempo total será recalculado automaticamente usando a data atual.</p>
        </div>
        <label>
          Data de entrada
          <input id="consortium-start-input" type="date" value="2023-04-15" />
        </label>
        <div class="time-editor-preview">
          <span>Tempo calculado</span>
          <strong id="time-preview">Calculando...</strong>
        </div>
        <button id="save-consortium-start" type="button">Salvar data inicial</button>
        <span id="time-editor-status"></span>
        </section>
      </main>
    </div>
    <script src="https://unpkg.com/lucide@0.468.0/dist/umd/lucide.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
    <script src="auth.js?v=2"></script>
    <script src="editar-tempo-consorcio.js"></script>
    <script>lucide.createIcons();</script>
    <script src="/admin-shell.js"></script>
    <script src="/pwa.js"></script>
  </body>
</html>
