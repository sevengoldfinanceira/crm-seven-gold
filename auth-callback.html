<!doctype html>
<html lang="pt-BR" style="background-color: #150126;">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Seven Gold | Validando login</title>
    <link rel="icon" href="assets/logo-copa.png?v=34" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="home.css?v=64" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#150126" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Seven Gold" />
    <link rel="apple-touch-icon" href="/assets/icons/apple-touch-icon.png?v=34" />
  </head>
  <body data-auth-callback>
    <script>
      (function() {
        const theme = localStorage.getItem("seven-gold-theme") || "light";
        if (theme === "dark") {
          document.body.classList.add("theme-dark");
        }
      })();
    </script>
    <main class="login-shell">
      <section class="login-panel" style="max-width: 520px; margin: auto;">
        <div class="login-form">
          <header>
            <p class="eyebrow">Validando acesso</p>
            <h2>Conectando sua conta Google...</h2>
          </header>
          <p class="login-note">Aguarde um instante. Voce sera redirecionado automaticamente.</p>
        </div>
      </section>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
    <script src="auth.js"></script>
    <script src="/pwa.js"></script>
  </body>
</html>
